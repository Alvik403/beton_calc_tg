services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - beton-network

  worker:
    build: .
    env_file:
      - .env
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - beton-jobs:/app/jobs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - beton-network

  bot:
    build: .
    env_file:
      - .env
    command: python -m app.main
    restart: unless-stopped
    networks:
      - beton-network

  web:
    build: .
    env_file:
      - .env
    command: uvicorn app.web:app --host 0.0.0.0 --port 8000
    ports:
      # снаружи 8080, внутри контейнера 8000 (если 8080 занят — поменяйте левую часть)
      - "8080:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - beton-jobs:/app/jobs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - beton-network

volumes:
  beton-jobs:

networks:
  beton-network:
    driver: bridge
    name: beton-network
