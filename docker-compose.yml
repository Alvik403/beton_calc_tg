services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - beton-network

  worker:
    build: .
    env_file:
      - .env
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WEB_PROFILES_DIR=/app/var/profiles
    volumes:
      - beton-jobs:/app/jobs
      - beton-profiles:/app/var/profiles
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - beton-network

  web:
    build: .
    env_file:
      - .env
    command: uvicorn app.web:app --host 0.0.0.0 --port 8000
    ports:
      # Порт хоста: BETON_WEB_PORT в .env или по умолчанию 8081 (8080 часто занят другими контейнерами)
      - "${BETON_WEB_PORT:-8081}:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WEB_PROFILES_DIR=/app/var/profiles
      # Обязательно в .env рядом с compose (Compose подхватывает его для подстановки).
      - CONFIG_PASSWORD=${CONFIG_PASSWORD:?Задайте CONFIG_PASSWORD в файле .env — см. .env.example}
    volumes:
      - beton-jobs:/app/jobs
      - beton-profiles:/app/var/profiles
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - beton-network

volumes:
  beton-jobs:
  beton-profiles:

networks:
  beton-network:
    driver: bridge
    name: beton-network
